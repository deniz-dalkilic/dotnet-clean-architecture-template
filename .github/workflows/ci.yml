name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Template.sln

      - name: Build
        run: dotnet build Template.sln --configuration Release --no-restore

      - name: Format verify
        run: dotnet format Template.sln --verify-no-changes

      - name: Test
        run: dotnet test Template.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: '**/*.trx'
