services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: template
      POSTGRES_PASSWORD: template
      POSTGRES_DB: template
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U template -d template"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - template-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - template-net

  # valkey:
  #   image: valkey/valkey:8-alpine
  #   ports:
  #     - "6380:6379"
  #   healthcheck:
  #     test: ["CMD", "valkey-cli", "ping"]
  #     interval: 10s
  #     timeout: 3s
  #     retries: 5
  #   volumes:
  #     - valkey_data:/data
  #   networks:
  #     - template-net

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: template
      RABBITMQ_DEFAULT_PASS: template
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - template-net

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  # valkey_data:

networks:
  template-net:
    name: template-net
